const NVIDIA_ENDPOINT="https://integrate.api.nvidia.com/v1/chat/completions";
let state={view:'home',course:null,lesson:null};let store={done:{},xp:0,answers:{},notes:{},reviews:{}};try{store=Object.assign(store,JSON.parse(localStorage.getItem('cs_plus')||'{}'))}catch(e){}
const app=document.getElementById('app');function save(){localStorage.setItem('cs_plus',JSON.stringify(store))}function esc(s){return String(s||'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function course(id){return DATA.courses.find(c=>c.id===id)}function lesson(id){return DATA.lessons.find(l=>l.id===id)}function currentLesson(){return state.lesson?lesson(state.lesson):(DATA.lessons.find(l=>!store.done[l.id])||DATA.lessons[0])}function pct(c){let ids=c.lessonIds;return Math.round(ids.filter(id=>store.done[id]).length/ids.length*100)}function level(){return Math.floor((store.xp||0)/200)+1}
function nav(){document.querySelectorAll('.nav').forEach(b=>b.classList.remove('active'));let m={home:0,course:0,lesson:0,study:1,chat:2,progress:3};document.querySelectorAll('.nav')[m[state.view]||0].classList.add('active')}function go(v){state.view=v;render();scrollTo(0,0)}function openCourse(id){state.course=id;state.view='course';render();scrollTo(0,0)}function openLesson(id){state.lesson=id;state.view='lesson';render();scrollTo(0,0)}function done(id){let l=lesson(id);if(!store.done[id]){store.done[id]=Date.now();store.xp=(store.xp||0)+l.xp;save()}render()}
function home(){let d=Object.keys(store.done).length;return `<div class="wrap"><section class="hero"><span class="badge">Identidade própria</span><h2>Programação explicada de verdade.</h2><p>Aulas mais completas, 5 quizzes por aula, desafios práticos e chat IA integrado para perguntar qualquer coisa.</p><div class="grid"><div class="card"><b>${d}/${DATA.lessons.length}</b><p class="muted">aulas concluídas</p></div><div class="card"><b>${store.xp||0} XP</b><p class="muted">nível ${level()}</p></div><div class="card"><b>5 quizzes</b><p class="muted">por aula</p></div></div></section><h2 class="section">Trilhas</h2><div class="grid">${DATA.courses.map(c=>`<article class="card" onclick="openCourse('${c.id}')"><span class="badge">${c.emoji} ${c.name}</span><h3>${c.name}</h3><p>${c.desc}</p><div class="progress"><span style="width:${pct(c)}%"></span></div><small class="muted">${c.lessonIds.length} aulas • ${pct(c)}%</small></article>`).join('')}</div></div>`}
function courseView(){let c=course(state.course);return `<div class="wrap"><button class="btn" onclick="go('home')">← Voltar</button><section class="card"><span class="badge">${c.emoji} ${c.name}</span><h2>${c.name}</h2><p>${c.desc}</p></section><div class="list">${c.lessonIds.map(id=>{let l=lesson(id);return `<button class="item ${store.done[id]?'done':''}" onclick="openLesson('${id}')"><strong>${store.done[id]?'✓ ':''}${l.title}</strong><small>${l.explain.slice(0,150)}...</small></button>`}).join('')}</div></div>`}
function quizHtml(l){return l.quizzes.map((q,i)=>{let key=l.id+'_q_'+i,val=store.answers[key];return `<details class="card"><summary>Quiz ${i+1}: ${q.q}</summary>${q.options.map((o,idx)=>`<button class="btn quiz" onclick="store.answers['${key}']=${idx};save();render()">${val===idx?'✓ ':''}${o}</button>`).join('')}${val!==undefined?`<div class="feedback ${val===q.answer?'good':'badbox'}">${val===q.answer?'Correto.':'Errado.'} ${q.why}</div>`:''}</details>`}).join('')}
function lessonView(){let l=lesson(state.lesson),c=course(l.course);return `<div class="wrap"><button class="btn" onclick="openCourse('${c.id}')">← Aulas</button><article class="card"><span class="badge">${c.emoji} ${c.name}</span><h2>${l.title}</h2><p><b>Explicação completa:</b> ${l.explain}</p><h2 class="section">Por que importa?</h2><p>${l.why}</p><h2 class="section">Modelo mental</h2><p>${l.mental}</p><h2 class="section">Onde usar</h2><ul>${l.where.map(x=>`<li>${x}</li>`).join('')}</ul><h2 class="section">Termos</h2><div class="termgrid">${l.terms.map(t=>`<div class="term"><b>${esc(t)}</b><p>Termo essencial desta aula. Veja no código e tente usar em um exemplo próprio.</p></div>`).join('')}</div><h2 class="section">Código exemplo</h2><pre class="code">${esc(l.code)}</pre><h2 class="section">Passo a passo de estudo</h2><ol>${l.steps.map(x=>`<li>${x}</li>`).join('')}</ol><h2 class="section">Erros comuns</h2><ul>${l.mistakes.map(x=>`<li>${x}</li>`).join('')}</ul><h2 class="section">Quiz sobre o que estudou</h2>${quizHtml(l)}<h2 class="section">Desafio prático</h2><div class="feedback warnbox"><b>${l.challenge.title}</b><p>${l.challenge.text}</p><textarea class="editor" id="codeBox" placeholder="Escreva sua resposta ou código...">${localStorage.getItem('code_'+l.id)||''}</textarea><div class="row"><button class="btn" onclick="localStorage.setItem('code_${l.id}',document.getElementById('codeBox').value)">Salvar</button><button class="btn primary" onclick="askLesson('${l.id}','corrigir')">Corrigir com IA</button><button class="btn warn" onclick="askLesson('${l.id}','desafio')">Novo desafio IA</button></div></div><h2 class="section">Anotação</h2><textarea oninput="store.notes['${l.id}']=this.value;save()" placeholder="Escreva com suas palavras...">${store.notes[l.id]||''}</textarea><div class="row"><button class="btn primary" onclick="askLesson('${l.id}','explicar')">IA explicar melhor</button><button class="btn ok" onclick="done('${l.id}')">Concluir aula</button></div></article></div>`}
function context(l){return `Curso: ${course(l.course).name}\nAula: ${l.title}\nExplicação: ${l.explain}\nTermos: ${l.terms.join(', ')}\nCódigo:\n${l.code}\nDesafio: ${l.challenge.text}`}
function askLesson(id,mode){let l=lesson(id),code=localStorage.getItem('code_'+id)||'';let p='';if(mode==='explicar')p=`Explique esta aula de forma completa para iniciante, com analogias, exemplos e resumo.\n\n${context(l)}`;if(mode==='desafio')p=`Gere um desafio personalizado sobre esta aula, com objetivo, requisitos, critérios e 3 dicas. Não entregue código pronto.\n\n${context(l)}`;if(mode==='corrigir')p=`Corrija meu código/resposta com base na aula. Mostre acertos, erros e melhorias sem fazer tudo por mim.\n\n${context(l)}\n\nMinha resposta:\n${code}`;localStorage.setItem('ai_prompt',p);state.view='chat';render()}
function study(){let n=DATA.lessons.find(l=>!store.done[l.id])||DATA.lessons[0];return `<div class="wrap"><section class="card"><h2>Estudo de hoje</h2><p>Próxima aula: <b>${n.title}</b></p><button class="btn primary" onclick="openLesson('${n.id}')">Começar</button></section></div>`}
function chat(){let key=localStorage.getItem('nvidia_key')||'',model=localStorage.getItem('nvidia_model')||'nvidia/nemotron-3-nano-30b-a3b',p=localStorage.getItem('ai_prompt')||'';return `<div class="wrap"><section class="card"><h2>Chat IA integrado</h2><p>Peça qualquer coisa: dúvida, explicação, quiz extra, desafio, correção de código, plano de estudo ou exemplo.</p><label>API Key NVIDIA</label><input id="apiKey" type="password" value="${esc(key)}"><label>Modelo</label><input id="model" value="${esc(model)}"><div class="row"><button class="btn" onclick="saveAI()">Salvar</button><button class="btn warn" onclick="localStorage.removeItem('nvidia_key');render()">Apagar chave</button></div></section><section class="card"><div class="row"><button class="btn" onclick="fill('Explique a aula atual de forma simples.')">Explicar</button><button class="btn" onclick="fill('Crie 5 quizzes novos sobre a aula atual com gabarito.')">Quiz extra</button><button class="btn" onclick="fill('Crie um desafio personalizado sobre a aula atual.')">Desafio</button><button class="btn" onclick="fill('Monte um plano de estudo para mim.')">Plano</button></div><textarea id="aiPrompt" placeholder="Peça o que quiser...">${esc(p)}</textarea><button class="btn primary" onclick="sendAI()">Enviar</button><div id="aiOut" class="feedback"></div></section></div>`}
function fill(t){document.getElementById('aiPrompt').value=t}function saveAI(){localStorage.setItem('nvidia_key',document.getElementById('apiKey').value.trim());localStorage.setItem('nvidia_model',document.getElementById('model').value.trim());alert('IA salva.')}
async function sendAI(){let key=localStorage.getItem('nvidia_key'),model=localStorage.getItem('nvidia_model')||'nvidia/nemotron-3-nano-30b-a3b',raw=document.getElementById('aiPrompt').value.trim(),out=document.getElementById('aiOut');localStorage.setItem('ai_prompt',raw);if(!key){out.className='feedback badbox';out.textContent='Coloque a API Key NVIDIA.';return}let l=currentLesson();let prompt=`Você é o tutor do CodeStudy Pro. Responda em PT-BR, explique bem e use exemplos. Não entregue desafio pronto quando for prática.\n\nContexto atual:\n${context(l)}\n\nPedido do aluno:\n${raw}`;out.textContent='Chamando IA...';try{let r=await fetch(NVIDIA_ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,temperature:.35,max_tokens:1800,messages:[{role:'system',content:'Você é professor de programação em PT-BR.'},{role:'user',content:prompt}]})});let txt=await r.text();if(!r.ok)throw new Error('HTTP '+r.status+' - '+txt.slice(0,400));let data=JSON.parse(txt);out.className='feedback good';out.textContent=data.choices?.[0]?.message?.content||txt}catch(e){out.className='feedback badbox';out.textContent='Falhou: '+e.message}}
function progress(){let d=Object.keys(store.done).length;return `<div class="wrap"><section class="card"><h2>Progresso</h2><p>Aulas: ${d}/${DATA.lessons.length}</p><p>XP: ${store.xp||0} • Nível ${level()}</p><div class="progress"><span style="width:${Math.round(d/DATA.lessons.length*100)}%"></span></div></section><div class="grid">${DATA.courses.map(c=>`<div class="card"><h3>${c.emoji} ${c.name}</h3><div class="progress"><span style="width:${pct(c)}%"></span></div><small>${pct(c)}%</small></div>`).join('')}</div></div>`}
function render(){try{nav();if(state.view==='course')app.innerHTML=courseView();else if(state.view==='lesson')app.innerHTML=lessonView();else if(state.view==='study')app.innerHTML=study();else if(state.view==='chat')app.innerHTML=chat();else if(state.view==='progress')app.innerHTML=progress();else app.innerHTML=home()}catch(e){app.innerHTML='<div class="wrap"><div class="feedback badbox"><h2>Erro interno</h2><p>'+esc(e.message)+'</p></div></div>'}}render();
</script></body></html>
