name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Validar
        run: |
          test -f www/index.html
          grep -q "CodeStudy Pro" www/index.html
      - run: npm install
      - run: rm -rf android && npx cap add android && npx cap sync android
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: CodeStudy-Pro-Mobile-APK
          path: android/app/build/outputs/apk/debug/*.apk
